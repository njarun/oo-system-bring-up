name: ci
on:
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-gate:
    if: >
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'ci:run')
    runs-on: [light]
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: scope
        name: Detect :app source changes
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base"...HEAD | grep -Eq '^app/src/'; then
            echo "run=1" >> "$GITHUB_OUTPUT"
          else
            echo "run=0" >> "$GITHUB_OUTPUT"
          fi
      - name: Unit tests (:app)
        if: steps.scope.outputs.run == '1'
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

  ship-gate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [ship]
    steps:
      - uses: actions/checkout@v4
      - name: Full assemble + unit tests (:app)
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest --no-daemon --stacktrace
